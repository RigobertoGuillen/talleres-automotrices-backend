services:
  - type: web
    name: taller-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        fromDatabase:
          name: taller-db
          property: host
      - key: DB_DATABASE
        fromDatabase:
          name: taller-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: taller-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: taller-db
          property: password
      - key: JWT_SECRET
        generate: true # Render creará un secret seguro automáticamente

databases:
  - name: taller-db
    plan: free