version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: taller_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taller_db_f0r4
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # IMPORTANTE: confirma que esta ruta coincida exactamente con el
      # nombre real de tu carpeta backend (antes decía "taller-backend",
      # pero el build context de abajo usa "talleres-automotrices-backend").
      - ./talleres-automotrices-backend/database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: taller_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@taller.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: ./talleres-automotrices-backend
      dockerfile: Dockerfile
    container_name: taller_backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=taller_db_f0r4
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./talleres-automotrices-frontend
      dockerfile: Dockerfile
    container_name: taller_frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data: